name: Cleanup Google Sheet

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Print sheet
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python3 -c "import json,os,gspread; c=json.loads(os.environ['GOOGLE_SERVICE_ACCOUNT_JSON']); w=gspread.service_account_from_dict(c).open_by_key(os.environ['GOOGLE_SHEET_ID']).sheet1; v=w.get_all_values(); print(f'ROWS:{len(v)}'); [print(f'{i}: {r}') for i,r in enumerate(v)]"
      - name: Cleanup foreign-language rows
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python cleanup_sheet.py
